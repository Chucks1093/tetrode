name: tetrode

services:
  postgres:
    image: postgres:16-alpine
    container_name: tetrode-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: tetrode
      POSTGRES_USER: tetrode
      POSTGRES_PASSWORD: tetrode
    volumes:
      - tetrode_pg:/var/lib/postgresql/data

volumes:
  tetrode_pg:
