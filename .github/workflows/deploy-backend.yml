name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'contracts/**'
      - '.gitmodules'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: deploy-tetrode-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure SSH
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.LIGHTSAIL_HOST }}" ]; then
            echo "Missing LIGHTSAIL_HOST secret"
            exit 1
          fi
          if [ -z "${{ secrets.LIGHTSAIL_USER }}" ]; then
            echo "Missing LIGHTSAIL_USER secret"
            exit 1
          fi
          if [ -z "${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}" ]; then
            echo "Missing LIGHTSAIL_SSH_PRIVATE_KEY secret"
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key

          # Prefer pinned host key via keyscan. Fallback keeps deploy moving if keyscan is blocked.
          if ! ssh-keyscan -T 30 -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "ssh-keyscan failed, using temporary StrictHostKeyChecking=no fallback"
          fi

          cat > ~/.ssh/config <<EOF
          Host lightsail-target
            HostName ${{ secrets.LIGHTSAIL_HOST }}
            User ${{ secrets.LIGHTSAIL_USER }}
            IdentityFile ~/.ssh/lightsail_key
            IdentitiesOnly yes
            ServerAliveInterval 20
            ServerAliveCountMax 3
            ConnectTimeout 20
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Upload release bundle to Lightsail
        run: |
          set -euo pipefail
          APP_DIR="${{ secrets.LIGHTSAIL_APP_DIR }}"
          if [ -z "$APP_DIR" ]; then
            APP_DIR="/home/ubuntu/tetrode"
          fi

          RELEASE_TAR="/tmp/tetrode-release.tar.gz"

          tar \
            --exclude='.git' \
            --exclude='**/node_modules' \
            --exclude='**/dist' \
            --exclude='**/.env' \
            --exclude='contracts/broadcast' \
            --exclude='server/tmp' \
            -czf "$RELEASE_TAR" .

          scp "$RELEASE_TAR" lightsail-target:/tmp/tetrode-release.tar.gz

          ssh lightsail-target "mkdir -p \"$APP_DIR\""
          ssh lightsail-target "tar -xzf /tmp/tetrode-release.tar.gz -C \"$APP_DIR\""

      - name: Build and restart backend on Lightsail
        run: |
          set -euo pipefail
          ssh lightsail-target <<'EOF_SSH'
          set -euo pipefail

          sudo mkdir -p /etc/tetrode
          if [ ! -f /etc/tetrode/server.env ]; then
            echo "Missing /etc/tetrode/server.env on the server"
            exit 1
          fi

          if ! command -v curl >/dev/null 2>&1; then
            sudo apt update
            sudo apt install -y curl
          fi

          if [ ! -d "$HOME/.nvm" ]; then
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
          fi

          export NVM_DIR="$HOME/.nvm"
          . "$NVM_DIR/nvm.sh"
          nvm install 22 >/dev/null
          nvm use 22 >/dev/null
          corepack enable >/dev/null 2>&1 || true
          corepack prepare pnpm@10.6.5 --activate >/dev/null 2>&1 || true

          APP_DIR="${{ secrets.LIGHTSAIL_APP_DIR }}"
          if [ -z "$APP_DIR" ]; then
            APP_DIR="$HOME/tetrode"
          fi

          cd "$APP_DIR/server"
          pnpm install --frozen-lockfile --child-concurrency=1
          pnpm exec prisma migrate deploy
          pnpm exec prisma generate
          pnpm build

          sudo install -D -m 644 "$APP_DIR/server/deploy/lightsail/tetrode-api.service" /etc/systemd/system/tetrode-api.service

          if command -v nginx >/dev/null 2>&1; then
            sudo install -D -m 644 "$APP_DIR/server/deploy/lightsail/nginx-tetrode.conf" /etc/nginx/sites-available/tetrode
            sudo ln -sfn /etc/nginx/sites-available/tetrode /etc/nginx/sites-enabled/tetrode
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl reload nginx
          fi

          sudo systemctl daemon-reload
          sudo systemctl enable --now tetrode-api
          sudo systemctl restart tetrode-api

          sudo systemctl --no-pager --full status tetrode-api
          EOF_SSH
